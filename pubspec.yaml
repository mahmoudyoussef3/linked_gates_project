name: linked_gates_project
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  retrofit: ^4.9.2
  json_annotation: ^4.11.0
  provider: ^6.1.5+1
  shimmer: ^3.0.0
  get_it: ^9.2.1
  cached_network_image: ^3.4.1
  flutter_screenutil: ^5.9.3
  fluttertoast: ^9.0.0
  pretty_dio_logger: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.14.1
  json_serializable: ^6.13.1
  retrofit_generator: ^10.2.5
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/splash_icon.png
  remove_alpha_ios: true

flutter:

  uses-material-design: true
  assets:
    - assets/images/
